<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGO PROYECT - Alfonso de Terry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="no-vertical-scroll">

    <header class="main-header">
        <div class="container h-100 d-flex justify-content-between align-items-center">
            <div class="logo-area d-flex align-items-center">
                <img src="https://res.cloudinary.com/dhadbyq7n/image/upload/v1713772846/906352_g6l6g5.png" alt="Logo" class="nav-logo">
                <h1 class="ms-3 fw-bold fs-4">CSGO PROYECT</h1>
            </div>
            <nav>
                <button class="nav-btn" id="btn-modes" onclick="renderApp('modes')">Modes</button>
                <button class="nav-btn" id="btn-maps" onclick="renderApp('maps')">Maps</button>
                <button class="nav-btn active" id="btn-arms" onclick="renderApp('arms')">Arms</button>
            </nav>
        </div>
    </header>

    <main class="gallery-section">
        <div id="cardsWrapper" class="horizontal-container">
        </div>
    </main>

    <footer class="main-footer">
        <div class="container h-100 d-flex justify-content-between align-items-center">
            <span class="fw-bold">Alfonso de Terry</span>
            <img src="https://res.cloudinary.com/dhadbyq7n/image/upload/v1713772846/906352_g6l6g5.png" alt="Logo" class="footer-logo">
            <span class="text-muted small">Copyright &copy; 2026</span>
            <div class="socials">
                <a href="#"><img src="https://res.cloudinary.com/dhadbyq7n/image/upload/v1713772422/25231_ng8o24.png" class="icon"></a>
                <a href="#"><img src="https://res.cloudinary.com/dhadbyq7n/image/upload/v1713772448/4481412_pkpynz.png" class="icon"></a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
