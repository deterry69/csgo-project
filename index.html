<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGO PROYECT - Alfonso de Terry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&family=New+Rocker&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="no-vertical-scroll">

    <header class="main-header">
        <div class="container h-100">
            <div class="logo-area d-flex align-items-center">
                <img src="https://res.cloudinary.com/dbadhyp7x/image/upload/v1777461418/Gemini_Generated_Image_zbiqf2zbiqf2zbiq_Nero_AI_Background_Remover_transparent_au75qv.png" alt="Logo" class="nav-logo">
                <h1 class="ms-3">CSGO PROYECT</h1>
            </div>
            <nav class="d-flex align-items-center justify-content-center gap-2">
                <button class="nav-btn" id="btn-modes" onclick="renderApp('modes')">Modes</button>
                <button class="nav-btn" id="btn-maps" onclick="renderApp('maps')">Maps</button>
                <button class="nav-btn active" id="btn-arms" onclick="renderApp('arms')">Arms</button>
            </nav>
            <div class="header-right">
                <!-- IMAGEN MUTE/DESMUTE: el src lo gestiona main.js con IMG_SOUND e IMG_MUTE -->
                <img id="muteBtn" src="" alt="Mute" class="mute-btn" onclick="toggleMute()">
            </div>
        </div>
    </header>

    <main class="gallery-section">
        <div class="video-background">
            <video autoplay muted loop playsinline id="bgVideo">
                <source src="https://res.cloudinary.com/dbadhyp7x/video/upload/v1777886746/LLUVIA_1_yxlhyo.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        <div id="cardsWrapper" class="horizontal-container"></div>
    </main>

    <footer class="main-footer">
        <div class="container h-100 d-flex justify-content-between align-items-center">
            <span class="fw-bold">Alfonso de Terry</span>
            <img src="https://res.cloudinary.com/dbadhyp7x/image/upload/v1777378902/Cs2-icon_lc7nll.jpg" alt="Logo" class="footer-logo">
            <span class="text-white small">Copyright &copy; 2026</span>
            <div class="socials">
                <a href="https://github.com/deterry69"><img src="https://res.cloudinary.com/dbadhyp7x/image/upload/v1777372422/25231_ngho24.png" class="icon"></a>
                <a href="https://www.linkedin.com/in/alfonso-de-terry-p%C3%A9rez-856872349/"><img src="https://res.cloudinary.com/dbadhyp7x/image/upload/v1777372446/4401412_pkpynz.png" class="icon"></a>
            </div>
        </div>
    </footer>

    <audio id="bgMusic" loop>
        <source src="https://res.cloudinary.com/dbadhyp7x/video/upload/v1778502091/Grabaci%C3%B3n_2026-05-11_141530_va7thq.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound">
        <source src="https://res.cloudinary.com/dbadhyp7x/video/upload/v1778502391/videoplayback_pcz8dd.mp3" type="audio/mpeg">
    </audio>

    <script src="main.js"></script>

    <div id="cookieOverlay"></div>

    <div id="cookieBanner">
        <div class="cookie-text">
            <strong>🍪 COOKIES — CSGO PROYECT</strong>
            We use cookies to improve your gaming experience on the site. You can accept or reject them. Your choice will be saved for future visits.
            <a href="#">More information</a>
        </div>
        <div class="cookie-actions">
            <button class="btn-cookie-reject" onclick="cookieChoice(false)">Reject</button>
            <button class="btn-cookie-accept" onclick="cookieChoice(true)">Accept</button>
        </div>
    </div>

</body>
</html>
